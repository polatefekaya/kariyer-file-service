name: kariyer-file-service

# Runs ONLY the file-service in a container. Postgres, Garnet and the OTel
# collector live in your OTHER compose stacks and are published on the host
# (:5432, :6380, :4318), so this container reaches them via host.docker.internal.
#
#   cp .env.example .env          # set secrets + use host.docker.internal hosts (see below)
#   docker compose up --build     # -> http://localhost:5290/health
#
# IMPORTANT: inside a container "127.0.0.1" is the container itself, so in .env the
# DB / Garnet / OTel hosts must be host.docker.internal (the bridge to your host):
#   ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=5432;Database=kariyerzamani_test;Username=postgres;Password=...
#   ConnectionStrings__Garnet=host.docker.internal:6380
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4318
# Make sure those other stacks are already running before `docker compose up`.

services:
  fileservice:
    build:
      context: .
      dockerfile: Dockerfile
    image: kariyer-file-service:local
    ports:
      - "5290:5290"
    env_file:
      - .env
    environment:
      # In a container the app MUST bind all interfaces. The .env's
      # http://127.0.0.1:5290 would only listen on the container loopback, so the
      # published port could never reach it — this override is required.
      ASPNETCORE_URLS: http://0.0.0.0:5290
    extra_hosts:
      # Resolves host.docker.internal on Linux too (it's automatic on Docker Desktop).
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5290/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
